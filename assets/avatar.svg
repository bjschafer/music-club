<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="38%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#7480f9"/>
      <stop offset="100%" stop-color="#434fc0"/>
    </radialGradient>
    <radialGradient id="label" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#ffbf66"/>
      <stop offset="100%" stop-color="#e8743b"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle (Discord crops avatars to a circle) -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Vinyl record -->
  <circle cx="256" cy="256" r="172" fill="#15151b"/>
  <g fill="none" stroke="#34343f" stroke-width="3">
    <circle cx="256" cy="256" r="152"/>
    <circle cx="256" cy="256" r="132"/>
    <circle cx="256" cy="256" r="112"/>
    <circle cx="256" cy="256" r="92"/>
  </g>
  <circle cx="256" cy="256" r="172" fill="url(#sheen)"/>

  <!-- Center label -->
  <circle cx="256" cy="256" r="60" fill="url(#label)"/>

  <!-- Eighth note -->
  <g fill="#15151b" transform="translate(256,256)">
    <rect x="7" y="-42" width="9" height="66" rx="4"/>
    <path d="M16 -42 q30 7 24 38 q-1 -22 -24 -18 z"/>
    <ellipse cx="-3" cy="26" rx="19" ry="14" transform="rotate(-20 -3 26)"/>
  </g>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="6"/>
</svg>
